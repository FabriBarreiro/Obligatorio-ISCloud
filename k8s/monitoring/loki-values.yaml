# Loki en modo simple para laboratorio/obligatorio.
# Se utiliza como backend centralizado de logs y se consulta desde Grafana.

# Modo monolítico: evita desplegar read/write/backend separados.
deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    allow_structured_metadata: true
    retention_period: 168h

  compactor:
    retention_enabled: true
    delete_request_store: filesystem

# Loki single binary con persistencia en EBS gp3.
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: ebs-gp3
    size: 10Gi

# Se deshabilitan componentes distribuidos para mantener la instalación simple.
read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

# Gateway interno para que Promtail y Grafana accedan a Loki.
gateway:
  enabled: true

# Evita jobs de test innecesarios en el laboratorio.
test:
  enabled: false

# Se evita instalar componentes adicionales de monitoreo/autoscraping de Loki.
monitoring:
  dashboards:
    enabled: false
  rules:
    enabled: false
  serviceMonitor:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# Se deshabilitan componentes auxiliares para reducir cantidad de pods en el lab.
# Esto evita errores de scheduling por limite maximo de pods en nodos chicos.
lokiCanary:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false
